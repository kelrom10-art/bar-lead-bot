databases:
  - name: bar-lead-bot-db
    plan: free
    region: oregon

services:
  - type: web
    name: bar-lead-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bar-lead-bot-db
          property: connectionString
      - key: APP_PIN
        value: "1234"
    healthCheckPath: /health
