services:
  - type: web
    name: bar-lead-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_PIN
        value: "1234"
    healthCheckPath: /health
