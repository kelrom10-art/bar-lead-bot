<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07070e">
<title>Bar Leads 🍸</title>
<link rel="manifest" href="/manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #07070e;
  --card: #0f1020;
  --card2: #161728;
  --card3: #1d1f35;
  --accent: #e8415a;
  --accent2: #0f2d6a;
  --accent-glow: rgba(232,65,90,0.30);
  --green: #00d4a0; --yellow: #ffc048; --red: #ff4d6d;
  --blue: #4facff; --purple: #b49aff; --amber: #ffa726;
  --text: #eeeef5; --text2: #5c6480; --text3: #9aa0b8;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --nav-h: 68px;
  --radius: 18px;
  --input-bg: rgba(255,255,255,0.04);
}
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
#app { height: 100%; display: flex; flex-direction: column; }
.screen { display: none; flex: 1; overflow-y: auto; padding: 0 16px calc(var(--nav-h) + 24px); }
.screen.active { display: block; }

/* ── LOGIN SCREEN ─────────────────────────────────────────────────────── */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; overflow: hidden;
}
#login-screen.hidden { display: none; }

/* Animated aurora background */
.login-bg {
  position: absolute; inset: -50%;
  background: conic-gradient(from 0deg at 50% 50%,
    #0f0721 0deg, #1a0a3d 60deg, #0b1a45 120deg,
    #07070e 180deg, #1a0519 240deg, #2d0a1e 300deg, #0f0721 360deg);
  animation: bgSpin 20s linear infinite;
  filter: blur(40px);
}
@keyframes bgSpin { to { transform: rotate(360deg); } }
.login-blob1 {
  position: absolute; width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(232,65,90,0.18) 0%, transparent 70%);
  top: -60px; left: 50%; transform: translateX(-50%);
  animation: blobFloat 6s ease-in-out infinite;
}
.login-blob2 {
  position: absolute; width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(79,172,255,0.12) 0%, transparent 70%);
  bottom: 80px; right: 20px;
  animation: blobFloat 8s ease-in-out infinite reverse;
}
@keyframes blobFloat { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-20px); } }

.login-card {
  position: relative; z-index: 2; width: 100%; max-width: 380px;
  background: rgba(15,16,32,0.85);
  backdrop-filter: blur(32px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 28px; padding: 36px 28px 32px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: none; } }

.login-logo {
  font-size: 64px; text-align: center; margin-bottom: 10px;
  filter: drop-shadow(0 0 24px rgba(232,65,90,0.5));
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse { 0%,100% { filter: drop-shadow(0 0 20px rgba(232,65,90,0.4)); } 50% { filter: drop-shadow(0 0 36px rgba(232,65,90,0.75)); } }
.login-title { text-align: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.login-sub { text-align: center; font-size: 13px; color: var(--text2); margin-bottom: 28px; }

.login-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
.login-tab {
  flex: 1; padding: 10px; border-radius: 9px; border: none;
  background: transparent; color: var(--text2); font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.login-tab.active { background: var(--card3); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

.login-form { display: flex; flex-direction: column; gap: 14px; }
.input-wrap { position: relative; }
.input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 17px; opacity: 0.5; pointer-events: none; }
.login-input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10); border-radius: 13px;
  padding: 14px 44px 14px 16px; color: var(--text); font-size: 15px;
  outline: none; transition: all 0.2s; font-family: inherit;
  direction: ltr; text-align: right;
}
.login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,65,90,0.12); background: rgba(255,255,255,0.07); }
.login-input::placeholder { color: var(--text2); }

.login-btn {
  width: 100%; padding: 15px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #e8415a, #c4243e);
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  box-shadow: 0 6px 20px rgba(232,65,90,0.35); transition: all 0.15s;
  letter-spacing: -0.2px; margin-top: 4px;
}
.login-btn:active { transform: scale(0.97); opacity: 0.88; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.login-error { color: var(--red); font-size: 13px; text-align: center; min-height: 18px; font-weight: 500; }
.login-footer { text-align: center; font-size: 12px; color: var(--text2); margin-top: 20px; }

/* ── HEADER ────────────────────────────────────────────────────────────── */
.header {
  background: linear-gradient(160deg, rgba(15,45,106,0.92) 0%, rgba(10,8,25,0.98) 100%);
  backdrop-filter: blur(24px);
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 12px;
}
.header-logo { font-size: 26px; flex-shrink: 0; }
.header-text { flex: 1; }
.header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
.header p { font-size: 11px; color: var(--text2); margin-top: 1px; }

.user-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7b2fff);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: #fff; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.15); flex-shrink: 0;
  transition: all 0.2s; box-shadow: 0 2px 10px rgba(232,65,90,0.3);
}
.user-avatar:active { transform: scale(0.92); }

/* User dropdown */
.user-dropdown {
  display: none; position: fixed; top: 68px; left: 0; right: 0; z-index: 300;
  padding: 0 16px;
}
.user-dropdown.open { display: block; }
.user-dropdown-card {
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 16px; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  animation: dropIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes dropIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
.user-dropdown-name { font-weight: 700; font-size: 15px; }
.user-dropdown-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.user-dropdown-sep { height: 1px; background: var(--border); margin: 12px 0; }
.user-dropdown-item {
  display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px;
  cursor: pointer; transition: background 0.15s; font-size: 14px;
}
.user-dropdown-item:active { background: rgba(255,255,255,0.06); }
.user-dropdown-item.danger { color: var(--red); }

/* ── NAV ───────────────────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
  background: rgba(10,10,22,0.97); backdrop-filter: blur(24px);
  border-top: 1px solid var(--border); display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: none; color: var(--text2);
  cursor: pointer; font-size: 10px; font-weight: 600;
  transition: all 0.2s; position: relative; padding-top: 2px;
}
.nav-btn .icon { font-size: 21px; transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); }
.nav-btn.active { color: var(--accent); }
.nav-btn.active .icon { transform: scale(1.18) translateY(-1px); }
.nav-btn.active::before {
  content: ''; position: absolute; top: 0; left: 25%; right: 25%;
  height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 0 0 4px 4px;
}
.nav-pill {
  position: absolute; top: 6px; right: calc(50% - 20px);
  background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 800; padding: 1px 5px;
  border-radius: 10px; min-width: 16px; text-align: center;
}

/* ── CARDS ──────────────────────────────────────────────────────────────── */
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.card-row { display: flex; justify-content: space-between; align-items: center; }

/* ── HERO STATS ─────────────────────────────────────────────────────────── */
.hero-card {
  background: linear-gradient(135deg, rgba(15,45,106,0.9) 0%, rgba(30,10,50,0.85) 100%);
  border: 1px solid rgba(79,172,255,0.15);
  border-radius: 22px; padding: 20px;
  margin-bottom: 14px; position: relative; overflow: hidden;
}
.hero-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(79,172,255,0.08) 0%, transparent 70%);
}
.hero-amount { font-size: 36px; font-weight: 900; letter-spacing: -1.5px; color: var(--yellow); }
.hero-label { font-size: 12px; color: var(--text3); margin-top: 3px; font-weight: 500; }
.hero-divider { width: 1px; background: rgba(255,255,255,0.1); align-self: stretch; margin: 0 16px; }
.hero-mini { display: flex; flex-direction: column; align-items: center; flex: 1; }
.hero-mini-val { font-size: 22px; font-weight: 800; }
.hero-mini-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ── STAT GRID ──────────────────────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card {
  background: var(--card); border-radius: 16px; padding: 16px 14px;
  border: 1px solid var(--border); text-align: center; position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: currentColor; opacity: 0.25;
}
.stat-num { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 5px; font-weight: 500; }
.stat-won    { color: var(--green); }
.stat-lost   { color: var(--red); }
.stat-active { color: var(--blue); }
.stat-money  { color: var(--yellow); }
.stat-purple { color: var(--purple); }

/* ── LEAD ITEMS ─────────────────────────────────────────────────────────── */
.lead-wrapper { position: relative; margin-bottom: 9px; overflow: hidden; border-radius: 16px; }
.lead-swipe-bg {
  position: absolute; inset: 0; border-radius: 16px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; font-size: 16px; font-weight: 700; pointer-events: none;
}
.swipe-won { color: var(--green); }
.swipe-lost { color: var(--red); }
.lead-item {
  background: var(--card); border-radius: 16px;
  padding: 13px 14px 13px 16px;
  border: 1px solid var(--border);
  border-right: 3px solid rgba(255,255,255,0.12);
  cursor: pointer; position: relative; z-index: 1; user-select: none; will-change: transform;
  transition: background 0.15s;
}
.lead-item:active { background: var(--card2); }
.lead-item.swiping { transition: none; }
.lead-item.s-new         { border-right-color: var(--blue); }
.lead-item.s-pre_reminded{ border-right-color: var(--yellow); }
.lead-item.s-called      { border-right-color: var(--purple); }
.lead-item.s-won         { border-right-color: var(--green); }
.lead-item.s-lost        { border-right-color: var(--red); }
.lead-item.s-follow_up   { border-right-color: var(--accent); }
.lead-item.s-old         { border-right-color: var(--text2); }

.lead-top { display: flex; align-items: center; gap: 10px; }
.lead-avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
}
.lead-info { flex: 1; min-width: 0; }
.lead-name { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.lead-phone { font-size: 12px; color: var(--text2); margin-top: 2px; direction: ltr; text-align: right; }
.lead-time-badge { font-size: 12px; color: var(--text2); }
.lead-meta { display: flex; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.lead-creator { font-size: 11px; color: var(--text2); opacity: 0.7; }

/* ── BADGES ─────────────────────────────────────────────────────────────── */
.badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.1px; }
.badge-new    { background: rgba(79,172,255,0.1);  color: var(--blue);   border: 1px solid rgba(79,172,255,0.2); }
.badge-pre    { background: rgba(255,192,72,0.1);  color: var(--yellow); border: 1px solid rgba(255,192,72,0.2); }
.badge-called { background: rgba(180,154,255,0.1); color: var(--purple); border: 1px solid rgba(180,154,255,0.2); }
.badge-won    { background: rgba(0,212,160,0.1);   color: var(--green);  border: 1px solid rgba(0,212,160,0.2); }
.badge-lost   { background: rgba(255,77,109,0.1);  color: var(--red);    border: 1px solid rgba(255,77,109,0.2); }
.badge-follow { background: rgba(232,65,90,0.1);   color: var(--accent); border: 1px solid rgba(232,65,90,0.2); }
.badge-old    { background: rgba(92,100,128,0.1);  color: var(--text2);  border: 1px solid rgba(92,100,128,0.15); }

/* ── FORMS ──────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
input, select, textarea {
  width: 100%; background: var(--input-bg);
  border: 1px solid var(--border2); border-radius: 13px;
  padding: 13px 16px; color: var(--text); font-size: 15px;
  outline: none; transition: all 0.2s; font-family: inherit;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,65,90,0.1);
  background: rgba(255,255,255,0.06);
}
textarea { resize: none; height: 80px; }
select { appearance: none; }

/* ── BUTTONS ────────────────────────────────────────────────────────────── */
.btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; letter-spacing: -0.2px; }
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-primary { background: linear-gradient(135deg, #e8415a, #c4243e); color: #fff; box-shadow: 0 4px 18px rgba(232,65,90,0.3); }
.btn-green   { background: linear-gradient(135deg, #00d4a0, #009f78); color: #fff; box-shadow: 0 4px 14px rgba(0,212,160,0.22); }
.btn-yellow  { background: linear-gradient(135deg, #ffc048, #e8a520); color: #000; box-shadow: 0 4px 14px rgba(255,192,72,0.22); }
.btn-red     { background: linear-gradient(135deg, #ff4d6d, #e03050); color: #fff; box-shadow: 0 4px 14px rgba(255,77,109,0.22); }
.btn-gray    { background: var(--card2); color: var(--text); border: 1px solid var(--border2); }
.btn-sm { padding: 10px 16px; font-size: 13px; width: auto; border-radius: 10px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── MODAL ──────────────────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.78); backdrop-filter: blur(10px);
  z-index: 200; align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card2); border-radius: 28px 28px 0 0;
  padding: 20px 20px 28px; width: 100%; max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1);
  border: 1px solid rgba(255,255,255,0.07); border-bottom: none;
}
@keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; text-align: center; letter-spacing: -0.4px; }

/* ── SEARCH ─────────────────────────────────────────────────────────────── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input { padding-right: 44px; }
.search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 17px; color: var(--text2); }

/* ── FILTER TABS ────────────────────────────────────────────────────────── */
.filter-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border2);
  background: rgba(255,255,255,0.03); color: var(--text2);
  font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.15s;
}
.filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 14px rgba(232,65,90,0.28); }

/* ── SORT ROW ───────────────────────────────────────────────────────────── */
.sort-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.sort-lbl { font-size: 12px; color: var(--text2); flex-shrink: 0; }
.sort-btn { padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border2); background: rgba(255,255,255,0.03); color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── TAG CHIPS ──────────────────────────────────────────────────────────── */
.tag-chip { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; margin: 2px; }
.tc-w { background: rgba(255,130,130,0.1); color: #ff9090; border: 1px solid rgba(255,130,130,0.2); }
.tc-b { background: rgba(130,200,255,0.1); color: #82c8ff; border: 1px solid rgba(130,200,255,0.2); }
.tc-p { background: rgba(255,192,72,0.1);  color: var(--yellow); border: 1px solid rgba(255,192,72,0.2); }
.tc-r { background: rgba(100,220,150,0.1); color: #64dc96; border: 1px solid rgba(100,220,150,0.2); }
.tc-x { background: rgba(180,154,255,0.1); color: var(--purple); border: 1px solid rgba(180,154,255,0.2); }
.tag-btn { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border2); background: rgba(255,255,255,0.03); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.tag-btn.selected { background: rgba(180,154,255,0.15); color: var(--purple); border-color: rgba(180,154,255,0.4); }
.tags-row { display: flex; flex-wrap: wrap; gap: 8px; }

/* ── MISC ───────────────────────────────────────────────────────────────── */
.time-badge {
  background: linear-gradient(135deg, var(--accent), #a8263e);
  color: #fff; padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 800; box-shadow: 0 2px 10px rgba(232,65,90,0.3);
}
.empty { text-align: center; padding: 50px 20px; color: var(--text2); }
.empty-icon { font-size: 52px; margin-bottom: 14px; opacity: 0.7; }
.section-title { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 8px; }
.loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
.loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

#toast {
  position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%);
  background: rgba(20,22,42,0.96); backdrop-filter: blur(20px);
  color: #fff; padding: 11px 22px; border-radius: 24px; font-size: 14px; font-weight: 600;
  z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#toast.show { opacity: 1; }
.chart-wrap { position: relative; height: 200px; margin: 10px 0; }
.chart-wrap-bar { position: relative; height: 160px; margin: 10px 0; }
.sep { height: 1px; background: var(--border); margin: 16px 0; }
.swipe-hint { text-align: center; font-size: 11px; color: var(--text2); padding: 2px 0 8px; opacity: 0.45; }

/* ── WON AMOUNT PROMPT ──────────────────────────────────────────────────── */
.won-input {
  width: 100%; background: rgba(0,212,160,0.05);
  border: 1px solid rgba(0,212,160,0.3); border-radius: 12px;
  padding: 12px 16px; color: var(--text); font-size: 16px; font-weight: 600;
  outline: none; font-family: inherit; direction: ltr; text-align: center;
  margin-bottom: 10px;
}
.won-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,212,160,0.12); }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ──────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-blob1"></div>
  <div class="login-blob2"></div>

  <div class="login-card">
    <div class="login-logo">🍸</div>
    <div class="login-title">Bar Leads</div>
    <div class="login-sub">מנהל לידים חכם לבר שלך</div>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" onclick="switchLoginTab('login')">כניסה</button>
      <button class="login-tab" id="tab-register" onclick="switchLoginTab('register')">הרשמה</button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="login-form" onsubmit="doLogin(event)">
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input class="login-input" type="text" id="l-username" placeholder="שם משתמש" autocomplete="username" required>
      </div>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="login-input" type="password" id="l-password" placeholder="סיסמה" autocomplete="current-password" required>
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="login-btn" type="submit" id="login-btn">כניסה לאפליקציה →</button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="login-form" style="display:none;" onsubmit="doRegister(event)">
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input class="login-input" type="text" id="r-username" placeholder="שם משתמש (3+ תווים)" autocomplete="username" required minlength="3">
      </div>
      <div class="input-wrap">
        <span class="input-icon">✨</span>
        <input class="login-input" type="text" id="r-display" placeholder="שם תצוגה (לדוגמא: נקו)" autocomplete="name">
      </div>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="login-input" type="password" id="r-password" placeholder="סיסמה (6+ תווים)" autocomplete="new-password" required minlength="6">
      </div>
      <div class="login-error" id="register-error"></div>
      <button class="login-btn" type="submit" id="register-btn">יצירת חשבון →</button>
    </form>

    <div class="login-footer">Bar Leads Manager v3.0 🍸</div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────────── -->
<div id="app" style="display:none;">

  <!-- Today screen -->
  <div id="screen-today" class="screen active">
    <div class="header">
      <span class="header-logo">🍸</span>
      <div class="header-text">
        <h1>Bar Leads</h1>
        <p id="today-date"></p>
      </div>
      <div class="user-avatar" id="user-avatar-btn" onclick="toggleUserDropdown()"></div>
    </div>
    <div id="today-content" style="padding-top:14px;"><div class="loading">טוען</div></div>
  </div>

  <!-- Leads screen -->
  <div id="screen-leads" class="screen">
    <div class="header">
      <span class="header-logo">📋</span>
      <div class="header-text"><h1>כל הלידים</h1></div>
      <div class="user-avatar" id="user-avatar-btn2" onclick="toggleUserDropdown()"></div>
    </div>
    <div style="padding-top:14px;">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="חיפוש שם / טלפון..." oninput="onSearch(this.value)">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">הכל</button>
        <button class="filter-tab" onclick="setFilter('new,pre_reminded,called,follow_up',this)">פעילים</button>
        <button class="filter-tab" onclick="setFilter('won',this)">נסגרו ✅</button>
        <button class="filter-tab" onclick="setFilter('lost',this)">אבדו ❌</button>
        <button class="filter-tab" onclick="setFilter('old',this)">ישנים 📁</button>
      </div>
      <div class="sort-row">
        <span class="sort-lbl">מיון:</span>
        <button class="sort-btn active" data-sort="date" onclick="setSort('date')">📅 תאריך</button>
        <button class="sort-btn" data-sort="name" onclick="setSort('name')">🔤 שם</button>
      </div>
      <div class="swipe-hint">← החלק שמאלה ❌ | ✅ ימינה →</div>
      <div id="leads-list"><div class="loading">טוען</div></div>
    </div>
  </div>

  <!-- Add lead screen -->
  <div id="screen-add" class="screen">
    <div class="header">
      <span class="header-logo">＋</span>
      <div class="header-text"><h1>הוספת ליד</h1></div>
    </div>
    <div style="padding-top:16px;">
      <form id="add-form" onsubmit="submitAdd(event)">
        <div class="form-group"><label>👤 שם הלקוח</label><input type="text" id="add-name" placeholder="ישראל ישראלי" required></div>
        <div class="form-group"><label>📱 טלפון</label><input type="tel" id="add-phone" placeholder="0501234567" required></div>
        <div class="form-group"><label>📅 מועד שיחה</label><input type="datetime-local" id="add-time"></div>
        <div class="form-group"><label>📝 הערות</label><textarea id="add-notes" placeholder="פרטים נוספים..."></textarea></div>
        <div class="form-group">
          <label>🏷️ תגיות</label>
          <div class="tags-row" id="add-tags-row">
            <button type="button" class="tag-btn" data-tag="חתונה" onclick="toggleAddTag(this)">💒 חתונה</button>
            <button type="button" class="tag-btn" data-tag="בר/בת מצווה" onclick="toggleAddTag(this)">🎉 ב"מ</button>
            <button type="button" class="tag-btn" data-tag="מסיבה" onclick="toggleAddTag(this)">🎊 מסיבה</button>
            <button type="button" class="tag-btn" data-tag="ברית" onclick="toggleAddTag(this)">👶 ברית</button>
            <button type="button" class="tag-btn" data-tag="אחר" onclick="toggleAddTag(this)">📌 אחר</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">🎯 הוסף ליד</button>
      </form>
    </div>
  </div>

  <!-- Stats screen -->
  <div id="screen-stats" class="screen">
    <div class="header">
      <span class="header-logo">📊</span>
      <div class="header-text"><h1>סטטיסטיקה</h1></div>
    </div>
    <div id="stats-content" style="padding-top:14px;"><div class="loading">טוען</div></div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="goTo('today',this)"><span class="icon">📅</span>היום</button>
    <button class="nav-btn" onclick="goTo('leads',this)"><span class="icon">📋</span>לידים</button>
    <button class="nav-btn" onclick="goTo('add',this)"><span class="icon">＋</span>הוסף</button>
    <button class="nav-btn" onclick="goTo('stats',this)"><span class="icon">📊</span>סטטיסטיקה</button>
  </nav>
</div>

<!-- User dropdown -->
<div id="user-dropdown" class="user-dropdown" onclick="closeDropdownOutside(event)">
  <div class="user-dropdown-card">
    <div class="user-dropdown-name" id="dropdown-name"></div>
    <div class="user-dropdown-sub" id="dropdown-sub"></div>
    <div class="user-dropdown-sep"></div>
    <div class="user-dropdown-item danger" onclick="doLogout()">🚪 התנתקות</div>
  </div>
</div>

<!-- Lead detail modal -->
<div class="modal-overlay" id="lead-modal" onclick="closeModal(event)">
  <div class="modal"><div class="modal-handle"></div><div id="lead-modal-body"></div></div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✒️ עריכת ליד</div>
    <form id="edit-form" onsubmit="submitEdit(event)">
      <div class="form-group"><label>👤 שם</label><input type="text" id="edit-name"></div>
      <div class="form-group"><label>📱 טלפון</label><input type="tel" id="edit-phone"></div>
      <div class="form-group"><label>📅 מועד שיחה</label><input type="datetime-local" id="edit-time"></div>
      <div class="form-group"><label>📝 הערות</label><textarea id="edit-notes"></textarea></div>
      <div class="form-group">
        <label>🏷️ תגיות</label>
        <div class="tags-row" id="edit-tags-row">
          <button type="button" class="tag-btn" data-tag="חתונה" onclick="toggleEditTag(this)">💒 חתונה</button>
          <button type="button" class="tag-btn" data-tag="בר/בת מצווה" onclick="toggleEditTag(this)">🎉 ב"מ</button>
          <button type="button" class="tag-btn" data-tag="מסיבה" onclick="toggleEditTag(this)">🎊 מסיבה</button>
          <button type="button" class="tag-btn" data-tag="ברית" onclick="toggleEditTag(this)">👶 ברית</button>
          <button type="button" class="tag-btn" data-tag="אחר" onclick="toggleEditTag(this)">📌 אחר</button>
        </div>
      </div>
      <div class="btn-row" style="margin-top:10px;">
        <button type="submit" class="btn btn-primary btn-sm" style="flex:1;">💾 שמור</button>
        <button type="button" class="btn btn-gray btn-sm" onclick="closeEditModal()">ביטול</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
let authToken = localStorage.getItem('auth_token') || null;
let currentUser = null;
let currentFilter = 'all', currentLeadId = null, statsChart = null, dailyChart = null, currentSort = 'date';
let selectedAddTags = new Set(), selectedEditTags = new Set();

// ── Auth helpers ──────────────────────────────────────────────────────
async function apiFetch(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(API + url, { ...options, headers });
  if (res.status === 401) {
    authToken = null; currentUser = null;
    localStorage.removeItem('auth_token');
    showLoginScreen();
    throw new Error('Unauthorized');
  }
  return res;
}

// ── Login / Register flow ─────────────────────────────────────────────
function switchLoginTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('login-error').textContent = '';
  document.getElementById('register-error').textContent = '';
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'מתחבר...';
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('l-username').value.trim(),
        password: document.getElementById('l-password').value
      })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'שגיאה בכניסה');
    }
    const data = await res.json();
    authToken = data.token; currentUser = data.user;
    localStorage.setItem('auth_token', authToken);
    enterApp();
  } catch(err) {
    errEl.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false; btn.textContent = 'כניסה לאפליקציה →';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const errEl = document.getElementById('register-error');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'יוצר חשבון...';
  try {
    const res = await fetch(API + '/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('r-username').value.trim(),
        password: document.getElementById('r-password').value,
        display_name: document.getElementById('r-display').value.trim()
      })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'שגיאה בהרשמה');
    }
    const data = await res.json();
    authToken = data.token; currentUser = data.user;
    localStorage.setItem('auth_token', authToken);
    enterApp();
  } catch(err) {
    errEl.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false; btn.textContent = 'יצירת חשבון →';
  }
}

async function doLogout() {
  closeDropdown();
  try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch(e) {}
  authToken = null; currentUser = null;
  localStorage.removeItem('auth_token');
  showLoginScreen();
}

function showLoginScreen() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
}

function enterApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display = '';
  updateUserDisplay();
  loadToday(); loadLeads();
}

function updateUserDisplay() {
  if (!currentUser) return;
  const name = currentUser.display_name || currentUser.username || '?';
  const initials = name.slice(0, 2).toUpperCase();
  ['user-avatar-btn', 'user-avatar-btn2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = initials;
  });
  document.getElementById('dropdown-name').textContent = name;
  document.getElementById('dropdown-sub').textContent = '@' + (currentUser.username || '');
}

function toggleUserDropdown() {
  document.getElementById('user-dropdown').classList.toggle('open');
}
function closeDropdown() {
  document.getElementById('user-dropdown').classList.remove('open');
}
function closeDropdownOutside(e) {
  if (e.target === document.getElementById('user-dropdown')) closeDropdown();
}

// ── App init ──────────────────────────────────────────────────────────
async function initApp() {
  const cfg = await fetch(API + '/api/app-config').then(r => r.json()).catch(() => ({}));

  if (authToken) {
    try {
      const res = await fetch(API + '/api/auth/me', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        currentUser = await res.json();
        enterApp();
        return;
      }
    } catch(e) {}
    authToken = null; localStorage.removeItem('auth_token');
  }

  showLoginScreen();
  // Auto-switch to register if no users exist yet
  if (!cfg.has_users) {
    switchLoginTab('register');
  }
}

// ── Escape ────────────────────────────────────────────────────────────
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tags & Sort ───────────────────────────────────────────────────────
function toggleAddTag(btn) {
  const tag = btn.dataset.tag;
  if (selectedAddTags.has(tag)) { selectedAddTags.delete(tag); btn.classList.remove('selected'); }
  else { selectedAddTags.add(tag); btn.classList.add('selected'); }
}
function toggleEditTag(btn) {
  const tag = btn.dataset.tag;
  if (selectedEditTags.has(tag)) { selectedEditTags.delete(tag); btn.classList.remove('selected'); }
  else { selectedEditTags.add(tag); btn.classList.add('selected'); }
}
function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  loadLeads(document.getElementById('search-input').value);
}
const TAG_COLORS = { 'חתונה':'tc-w', 'בר/בת מצווה':'tc-b', 'מסיבה':'tc-p', 'ברית':'tc-r' };
function renderTags(tags) {
  return (tags||'').split(',').filter(t=>t.trim()).map(t => {
    const cls = TAG_COLORS[t.trim()] || 'tc-x';
    return `<span class="tag-chip ${cls}">🏷 ${esc(t.trim())}</span>`;
  }).join('');
}

// ── Avatar color ──────────────────────────────────────────────────────
const AVATAR_COLORS = [
  'linear-gradient(135deg,#e8415a,#7b2fff)',
  'linear-gradient(135deg,#4facff,#0070e0)',
  'linear-gradient(135deg,#00d4a0,#0070b0)',
  'linear-gradient(135deg,#ffc048,#ff7020)',
  'linear-gradient(135deg,#b49aff,#7040e0)',
];
function nameToColor(name) {
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function nameInitials(name) {
  if (!name) return '?';
  return name.trim().slice(0, 2).toUpperCase();
}

// ── Utilities ─────────────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function fmtDT(dt) {
  if (!dt) return '—';
  try {
    const d = new Date(dt.replace(' ','T'));
    return d.toLocaleDateString('he-IL') + ' ' + d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  } catch { return dt; }
}
function fmtTime(dt) {
  if (!dt) return '';
  try {
    const d = new Date(dt.replace(' ','T'));
    return d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  } catch { return ''; }
}
function toLocalDatetime(s) {
  if (!s) return '';
  try {
    const d = new Date(s.replace(' ','T'));
    const p = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  } catch { return ''; }
}
function fromLocalDatetime(v) { return v ? v.replace('T',' ') + ':00' : null; }
function badgeClass(s) {
  return ({new:'badge-new',pre_reminded:'badge-pre',called:'badge-called',
           won:'badge-won',lost:'badge-lost',follow_up:'badge-follow',old:'badge-old'})[s] || 'badge-new';
}

// ── Navigation ────────────────────────────────────────────────────────
function goTo(screen, btn) {
  closeDropdown();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  btn.classList.add('active');
  if (screen === 'today') loadToday();
  if (screen === 'leads') loadLeads();
  if (screen === 'stats') loadStats();
}

// ── Today screen ──────────────────────────────────────────────────────
async function loadToday() {
  const now = new Date();
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
  try {
    const [todayLeads, stats] = await Promise.all([
      apiFetch('/api/leads/today').then(r => r.json()),
      apiFetch('/api/stats').then(r => r.json())
    ]);
    const active = todayLeads.filter(l => ['new','pre_reminded','called','follow_up'].includes(l.status));
    const done   = todayLeads.filter(l => ['won','lost'].includes(l.status));
    const m = stats.monthly || {};

    // Hero card
    let html = `
      <div class="hero-card">
        <div style="display:flex;align-items:center;gap:16px;">
          <div style="flex:1;">
            <div class="hero-label">הכנסות החודש</div>
            <div class="hero-amount">₪${(m.won_amount||0).toLocaleString('he-IL',{maximumFractionDigits:0})}</div>
          </div>
          <div class="hero-divider"></div>
          <div class="hero-mini">
            <div class="hero-mini-val stat-active">${stats.active||0}</div>
            <div class="hero-mini-lbl">פעילים</div>
          </div>
          <div class="hero-divider"></div>
          <div class="hero-mini">
            <div class="hero-mini-val stat-won">${m.won_count||0}</div>
            <div class="hero-mini-lbl">נסגרו</div>
          </div>
        </div>
      </div>`;

    if (active.length) {
      html += `<div class="section-title">📞 שיחות להיום (${active.length})</div>`;
      active.forEach(l => {
        html += `<div class="lead-item s-${l.status}" onclick="openLead('${l.id}')" style="margin-bottom:9px;border-radius:16px;">
          <div class="lead-top">
            <div class="lead-avatar" style="background:${nameToColor(l.name)}">${nameInitials(l.name)}</div>
            <div class="lead-info">
              <div class="lead-name">${esc(l.name)}</div>
              <div class="lead-phone">${esc(l.phone)}</div>
            </div>
            ${fmtTime(l.call_time) ? `<span class="time-badge">${fmtTime(l.call_time)}</span>` : ''}
          </div>
          <div class="lead-meta" style="margin-top:8px;">
            <span class="badge ${badgeClass(l.status)}">${l.status_emoji} ${l.status_heb}</span>
          </div>
        </div>`;
      });
    } else {
      html += `<div class="card" style="text-align:center;padding:28px 20px;">
        <div style="font-size:40px;margin-bottom:10px;">✅</div>
        <div style="color:var(--text2);font-size:14px;">אין שיחות מתוכננות להיום</div>
      </div>`;
    }
    if (done.length) {
      html += `<div class="section-title">✅ טופל היום (${done.length})</div>`;
      done.forEach(l => {
        html += `<div class="lead-item s-${l.status}" onclick="openLead('${l.id}')" style="margin-bottom:9px;border-radius:16px;">
          <div class="lead-top">
            <div class="lead-avatar" style="background:${nameToColor(l.name)}">${nameInitials(l.name)}</div>
            <div class="lead-info">
              <div class="lead-name">${esc(l.name)}</div>
              <div class="lead-phone">${esc(l.phone)}</div>
            </div>
          </div>
          <div class="lead-meta" style="margin-top:8px;">

function onSearch(v) { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => loadLeads(v), 300); }
function setFilter(f, btn) {

  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));

async function loadLeads(q='') {
  const list = document.getElementById('leads-list');
  list.innerHTML = '<div class="loading">טוען</div>';
  try {
    let url = '/api/leads';
    const p = [];
    if (q) p.push('q='+encodeURIComponent(q));
    else if (currentFilter !== 'all') p.push('status='+currentFilter);
    if (p.length) url += '?' + p.join('&');
    let leads = await apiFetch(url).then(r => r.json());
    if (!leads.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>לא נמצאו לידים</div></div>';
      return;
    }
    if (currentSort === 'name') leads.sort((a,b) => (a.name||'').localeCompare(b.name||'','he'));
    else leads.sort((a,b) => (a.call_time||'').localeCompare(b.call_time||''));

    list.innerHTML = leads.map(l => `
      <div class="lead-wrapper" id="wrap-${l.id}">
        <div class="lead-swipe-bg">
          <span class="swipe-won">✅ נסגר</span>
          <span class="swipe-lost">❌ אבד</span>
        </div>
        <div class="lead-item s-${l.status}" id="item-${l.id}" onclick="openLead('${l.id}')">
          <div class="lead-top">
            <div class="lead-avatar" style="background:${nameToColor(l.name)}">${nameInitials(l.name)}</div>
            <div class="lead-info">
              <div class="lead-name">${esc(l.name)}</div>
              <div class="lead-phone">${esc(l.phone)}</div>
            </div>
            ${fmtTime(l.call_time) ? `<div class="lead-time-badge">⏰ ${fmtTime(l.call_time)}</div>` : ''}
          </div>
          <div class="lead-meta">
            <span class="badge ${badgeClass(l.status)}">${l.status_emoji} ${l.status_heb}</span>
            ${l.call_time ? `<span style="font-size:11px;color:var(--text2)">📅 ${fmtDT(l.call_time)}</span>` : ''}
            ${renderTags(l.tags)}
            ${l.created_by ? `<span class="lead-creator">➕ ${esc(l.created_by)}</span>` : ''}
          </div>
        </div>
      </div>`).join('');
    leads.forEach(l => addSwipe(l.id));
  } catch(e) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>שגיאה בטעינה</div></div>';
  }
}

// ── Swipe gestures ────────────────────────────────────────────────────
function addSwipe(id) {
  const el = document.getElementById('item-'+id);
  const wrap = document.getElementById('wrap-'+id);
  if (!el || !wrap) return;
  let startX=0, startY=0, dx=0, dragging=false, cancelled=false;
  const THRESHOLD = 80;
  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY; dx = 0; dragging = true; cancelled = false;
    el.classList.add('swiping');
  }
  function onMove(e) {
    if (!dragging || cancelled) return;
    const t = e.touches ? e.touches[0] : e;
    dx = t.clientX - startX;
    const dy = Math.abs(t.clientY - startY);
    if (dy > Math.abs(dx) && Math.abs(dx) < 20) { cancelled = true; el.style.transform = ''; return; }
    e.preventDefault();
    const c = Math.max(-140, Math.min(140, dx));
    el.style.transform = `translateX(${c}px)`;
    if (dx > 30) wrap.style.background = `rgba(0,212,160,${Math.min(0.4,dx/200)})`;
    else if (dx < -30) wrap.style.background = `rgba(255,77,109,${Math.min(0.4,-dx/200)})`;
    else wrap.style.background = '';
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false; el.classList.remove('swiping');
    el.style.transition = 'transform .25s ease'; wrap.style.background = '';
    if (!cancelled && dx > THRESHOLD) {
      el.style.transform = 'translateX(110%)';
      setTimeout(() => setStatusSwipe(id,'won'), 220);
    } else if (!cancelled && dx < -THRESHOLD) {
      el.style.transform = 'translateX(-110%)';
      setTimeout(() => setStatusSwipe(id,'lost'), 220);
    } else {
      el.style.transform = '';
    }
    setTimeout(() => { el.style.transition = ''; }, 300);
  }
  el.addEventListener('touchstart', onStart, {passive:true});
  el.addEventListener('touchmove', onMove, {passive:false});
  el.addEventListener('touchend', onEnd);
}
async function setStatusSwipe(id, status) {
  await apiFetch('/api/leads/'+id, {
    method:'PUT', body: JSON.stringify({status})
  });
  toast(status === 'won' ? '✅ נסגר!' : '❌ אבד');
  loadLeads(document.getElementById('search-input').value);
}

      </div>

      </div>
    </div>`;
  setTimeout(() => document.getElementById('inline-won-amt')?.focus(), 100);
}

async function finalizeWon(id) {
  const amtEl = document.getElementById('inline-won-amt');
  const body = {status:'won'};
  if (amtEl && amtEl.value) body.sale_amount = parseFloat(amtEl.value);
  await apiFetch('/api/leads/'+id, {method:'PUT', body: JSON.stringify(body)});
  toast('🎉 עסקה נסגרה!');
  document.getElementById('lead-modal').classList.remove('open');
  loadToday(); loadLeads();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('lead-modal')) return;
  document.getElementById('lead-modal').classList.remove('open');
  currentLeadId = null; loadToday(); loadLeads();
}

async function setStatus(id, status) {
  await apiFetch('/api/leads/'+id, {method:'PUT', body: JSON.stringify({status})});
  toast('✅ סטאטוס עודכן!');
  document.getElementById('lead-modal').classList.remove('open');
  loadToday(); loadLeads();
}

async function saveAmount(id) {
  const amt = document.getElementById('won-amount').value;
  if (!amt) { toast('הכנס סכום'); return; }
  await apiFetch('/api/leads/'+id, {method:'PUT', body: JSON.stringify({sale_amount: parseFloat(amt)})});
  toast('💰 סכום נשמר!'); openLead(id);
}

async function deleteLead(id) {
  if (!confirm('למחוק את הליד?')) return;
  await apiFetch('/api/leads/'+id, {method:'DELETE'});
  document.getElementById('lead-modal').classList.remove('open');
  toast('🗑 ליד נמחק'); loadToday(); loadLeads();
}

// ── Edit modal ────────────────────────────────────────────────────────
async function openEdit(id) {
  const l = await apiFetch('/api/leads/'+id).then(r => r.json());
  document.getElementById('edit-name').value = l.name || '';
  document.getElementById('edit-phone').value = l.phone || '';
  document.getElementById('edit-time').value = toLocalDatetime(l.call_time);
  document.getElementById('edit-notes').value = l.notes || '';
  selectedEditTags = new Set((l.tags||'').split(',').filter(t=>t.trim()));
  document.querySelectorAll('#edit-tags-row .tag-btn').forEach(b => {
    b.classList.toggle('selected', selectedEditTags.has(b.dataset.tag));
  });
  document.getElementById('lead-modal').classList.remove('open');
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal(e) {
  if (e && e.target !== document.getElementById('edit-modal')) return;
  document.getElementById('edit-modal').classList.remove('open');
}
async function submitEdit(e) {
  e.preventDefault(); if (!currentLeadId) return;
  const name = document.getElementById('edit-name').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  if (!name || !phone) { toast('שם וטלפון הם שדות חובה'); return; }
  const body = {
    name, phone,
    call_time: fromLocalDatetime(document.getElementById('edit-time').value),
    notes: document.getElementById('edit-notes').value.trim(),
    tags: [...selectedEditTags].join(',')
  };
  const res = await apiFetch('/api/leads/'+currentLeadId, {method:'PUT', body: JSON.stringify(body)});
  document.getElementById('edit-modal').classList.remove('open');
  if (res.ok) toast('✅ ליד עודכן!'); else toast('❌ שגיאה בעדכון');
  loadToday(); loadLeads();
}

// ── Add lead ──────────────────────────────────────────────────────────
async function submitAdd(e) {
  e.preventDefault();
  const body = {
    name: document.getElementById('add-name').value.trim(),
    phone: document.getElementById('add-phone').value.trim(),
    call_time: fromLocalDatetime(document.getElementById('add-time').value),
    notes: document.getElementById('add-notes').value.trim(),
    tags: [...selectedAddTags].join(',')
  };
  if (!body.name || !body.phone) { toast('מלא שם וטלפון'); return; }
  const res = await apiFetch('/api/leads', {method:'POST', body: JSON.stringify(body)});
  if (res.ok) {
    e.target.reset();
    selectedAddTags.clear();
    document.querySelectorAll('#add-tags-row .tag-btn').forEach(b => b.classList.remove('selected'));
    toast('🎯 ליד נוסף!');
    goTo('today', document.querySelector('.nav-btn'));
  } else { toast('❌ שגיאה בהוספה'); }
}

        <div style="font-size:38px;font-weight:900;color:var(--green);letter-spacing:-2px;">₪${(m.won_amount||0).toLocaleString('he-IL',{maximumFractionDigits:0})}</div>
        <div style="display:flex;gap:16px;margin-top:12px;">
          <div style="flex:1;text-align:center;"><div style="font-size:20px;font-weight:800;color:var(--green)">${m.won_count||0}</div><div style="font-size:11px;color:var(--text2);">נסגרו</div></div>
          <div style="width:1px;background:var(--border)"></div>

          <div style="width:1px;background:var(--border)"></div>

        </div>
      </div>
      <div class="section-title">🏆 מדדי ביצוע</div>
      <div class="stat-grid">
        <div class="stat-card stat-purple"><div class="stat-num stat-purple">${stats.avg_days_to_close||'--'}</div><div class="stat-lbl">ימים לסגירה ממוצע</div></div>
        <div class="stat-card stat-money"><div class="stat-num stat-money">${stats.avg_sale?'₪'+Number(stats.avg_sale).toLocaleString('he-IL',{maximumFractionDigits:0}):'--'}</div><div class="stat-lbl">עסקה ממוצעת</div></div>
        <div class="stat-card stat-active"><div class="stat-num stat-active">${stats.active||0}</div><div class="stat-lbl">לידים פעילים</div></div>
        <div class="stat-card"><div class="stat-num">${stats.total||0}</div><div class="stat-lbl">סה"כ לידים</div></div>
      </div>
      <div class="section-title">📅 7 ימים אחרונים</div>
      <div class="stat-grid">
        <div class="stat-card stat-active"><div class="stat-num stat-active">${w.total||0}</div><div class="stat-lbl">לידים</div></div>
        <div class="stat-card stat-won"><div class="stat-num stat-won">${w.won_count||0}</div><div class="stat-lbl">נסגרו</div></div>
        <div class="stat-card stat-money"><div class="stat-num stat-money">₪${(w.won_amount||0).toLocaleString('he-IL',{maximumFractionDigits:0})}</div><div class="stat-lbl">הכנסות</div></div>

async function exportExcel() {
  toast('⏳ מכין קובץ...');
  const res = await apiFetch('/api/export');
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'leads.xlsx'; a.click();
  URL.revokeObjectURL(url);
}
